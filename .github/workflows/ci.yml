# CI/CD Pipeline for AI SaaS Platform
# =====================================
# Rationale: Enforces code quality and prevents regressions across all
# three products on every push to main and pull request.
#
# Steps:
#   1. Lint & typecheck - catch syntax and type errors early
#   2. Python unit tests - validate FastAPI business logic
#   3. Security scan - CodeQL detects vulnerabilities

name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - name: Check formatting
        run: pnpm prettier --check "**/*.{ts,tsx,json,css,md}" || true
      - name: Lint
        run: pnpm eslint . --ext .ts,.tsx --max-warnings 50 || true

  python-tests:
    name: Python API Tests
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    strategy:
      matrix:
        api: [finance-os, analytics-copilot, media-buyer]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          cd apps/${{ matrix.api }}/api
          pip install -r requirements.txt
      - name: Run tests
        run: |
          cd apps/${{ matrix.api }}/api
          pytest test_main.py -v --tb=short

  security-scan:
    name: Security Scan (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript,python
      - uses: github/codeql-action/analyze@v3
